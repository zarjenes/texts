            <h1 class="page-title ballet-font">Argel</h1>
            
            <div class="poem-grid">
                <div class="poem-text-content">
                    <pre class="poem-body garamond-font">
Jade, zarco, negro y miel,
un rosario parte montes,
nubla al ojo de horizontes
para sembrarlo en la piel;
sobre el lomo de un argel 
es la vida desgraciada 
hasta que cae la mirada 
en la sagrada mujer:
dudar, amar y ceder
en los labios de una amada.

                    </pre>
